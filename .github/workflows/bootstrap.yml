name: Dokumentation initialisieren

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Dokumentation entpacken
        run: |
          test -f bootstrap/docs.tar.gz
          tar -xzf bootstrap/docs.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Dokumentation prüfen und bauen
        run: |
          pip install -r requirements.txt
          mkdocs build --strict

      - name: Dokumentation committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: modulare Projektdokumentation hinzufügen"
          git push

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Seitenartefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
