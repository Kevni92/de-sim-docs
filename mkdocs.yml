site_name: Deutschland-Simulator – Dokumentation
site_description: Pflichtenheft und Research Briefing für einen transparenten Staatshaushalts- und Wirkungssimulator
site_url: https://kevni92.github.io/de-sim-docs/
repo_url: https://github.com/Kevni92/de-sim-docs
repo_name: Kevni92/de-sim-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dunkle Darstellung
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Helle Darstellung
plugins:
  - search:
      lang: de
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
extra_css:
  - assets/stylesheets/extra.css
nav:
  - Start: index.md
  - Einstieg und Meta:
      - Übersicht: 00-meta/index.md
      - KI-Leseindex: 00-meta/ki-leseindex.md
      - Dokumentationsstandard: 00-meta/dokumentationsstandard.md
      - Glossar: 00-meta/glossar.md
  - Produktkonzept:
      - Vision und Grundsätze: 01-produkt/vision-und-grundsaetze.md
      - Anforderungskatalog: 01-produkt/anforderungskatalog.md
      - UI und Interaktion: 01-produkt/ui-und-interaktionsmodell.md
  - Fiskalisches Modell:
      - Systemgrenze und Baseline: 02-fiskal/systemgrenze-und-baseline.md
      - Einnahmen und Steuern: 02-fiskal/einnahmen-und-steuern.md
      - Ausgaben und Leistungen: 02-fiskal/ausgaben-und-leistungen.md
  - Bevölkerung und Daten:
      - Synthetische Bevölkerung: 03-daten/synthetische-bevoelkerung.md
  - Wirkungsmodellierung:
      - Wirkungsmodell: 04-modell/wirkungsmodell.md
      - Indirekte Wirkungen: 04-modell/indirekte-und-nichtmonetaere-wirkungen.md
      - Unsicherheit und Szenarien: 04-modell/unsicherheit-und-szenarien.md
  - Fachliche Module:
      - Kita, Familie und Bildung: 05-module/kita-familie-und-bildung.md
      - Gesundheit und Bürokratie: 05-module/gesundheit-krankheit-und-buerokratie.md
      - Demografie und Alterspyramide: 05-module/demografie-und-alterspyramide.md
      - Weitere Wirkungsmodule: 05-module/weitere-wirkungsmodule.md
  - Evidenz und Transparenz:
      - Evidenzdatenbank: 06-evidenz/evidenzdatenbank.md
      - Evidenzschema: 06-evidenz/evidenzschema.md
      - Berechnungstransparenz: 06-evidenz/berechnungstransparenz.md
      - Quellenregister: 06-evidenz/quellenregister.md
  - Visualisierung:
      - Visualisierungen: 07-visualisierung/visualisierungen.md
  - Technik:
      - Technische Architektur: 08-technik/technische-architektur.md
      - Modulvertrag: 08-technik/modulvertrag.md
  - Governance:
      - Validierung, Governance und Ethik: 09-governance/validierung-governance-ethik.md
  - Umsetzung:
      - Implementierungsprinzipien: 10-roadmap/implementierungsprinzipien.md
      - MVP und Roadmap: 10-roadmap/mvp-und-roadmap.md
      - Research Backlog: 10-roadmap/research-backlog.md
  - Design:
      - Figma-Prompt: 11-design/figma-prompt.md
