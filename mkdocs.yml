site_name: Deutschland-Simulator – Fachliche Dokumentation
site_description: Fachliche Grundlagen, Datenquellen, Wirkungsmodelle und Evidenz für einen transparenten Staatshaushalts- und Wirkungssimulator
site_url: https://kevni92.github.io/de-sim-docs/
repo_url: https://github.com/Kevni92/de-sim-docs
repo_name: Kevni92/de-sim-docs
edit_uri: edit/main/docs/

# Interne Planungs-, Technik-, Design- und Umsetzungsunterlagen bleiben im
# Repository erhalten, werden aber weder gebaut noch in Suche oder Navigation
# der öffentlichen Website aufgenommen.
exclude_docs: |
  00-meta/ki-leseindex.md
  00-meta/dokumentationsstandard.md
  01-produkt/anforderungskatalog.md
  01-produkt/ui-und-interaktionsmodell.md
  08-technik/
  10-roadmap/
  11-design/

theme:
  name: material
  language: de
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dunkle Darstellung
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Helle Darstellung

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Start: index.md
  - Grundlagen:
      - Fachlicher Überblick: 00-meta/index.md
      - Zielbild und Grundsätze: 01-produkt/vision-und-grundsaetze.md
      - Informationsarchitektur und progressive Offenlegung: 01-produkt/informationsarchitektur-und-progressive-offenlegung.md
      - Glossar: 00-meta/glossar.md
  - Staatshaushalt und Steuern:
      - Systemgrenze und Baseline: 02-fiskal/systemgrenze-und-baseline.md
      - Einnahmen und Steuern: 02-fiskal/einnahmen-und-steuern.md
      - Einkommensteuer-Modul 2026: 02-fiskal/einkommensteuer-modul.md
      - Weitere Einnahmemodule: 02-fiskal/weitere-einnahmemodule.md
      - Ausgaben und Leistungen: 02-fiskal/ausgaben-und-leistungen.md
      - Ausgabenmodule 2026: 02-fiskal/ausgabenmodule.md
      - Bürgergeld- und Grundsicherungsgeld-Modul: 02-fiskal/buergergeld-modul.md
      - Bürgergeld – verständlicher Standardmodus: 02-fiskal/buergergeld-standardmodus.md
      - Bürgergeld – Bedienoberfläche und Szenarien: 02-fiskal/buergergeld-bedienoberflaeche.md
      - Unterkunft und Heizung – Berlin 2026: 02-fiskal/kdu-berlin-2026.md
  - Bevölkerung und Datenbasis:
      - Automatische Standard-Modellbasis: 03-daten/standard-modellbasis.md
      - Synthetische Bevölkerung: 03-daten/synthetische-bevoelkerung.md
  - Wirkungsmodellierung:
      - Grundmodell: 04-modell/wirkungsmodell.md
      - Modellstufe und Zeithorizont: 04-modell/modellstufe-und-zeithorizont.md
      - Indirekte und nicht monetäre Wirkungen: 04-modell/indirekte-und-nichtmonetaere-wirkungen.md
      - Indirekte und langfristige Wirkungen: 04-modell/indirekte-und-langfristige-wirkungen.md
      - Unsicherheit und Szenarien: 04-modell/unsicherheit-und-szenarien.md
  - Fachliche Themenfelder:
      - Kita, Familie und Bildung: 05-module/kita-familie-und-bildung.md
      - Gesundheit, Krankheit und Verwaltung: 05-module/gesundheit-krankheit-und-buerokratie.md
      - Demografie und Alterspyramide: 05-module/demografie-und-alterspyramide.md
      - Weitere Wirkungsbereiche: 05-module/weitere-wirkungsmodule.md
  - Evidenz und Nachvollziehbarkeit:
      - Evidenzdatenbank: 06-evidenz/evidenzdatenbank.md
      - Evidenzschema: 06-evidenz/evidenzschema.md
      - Berechnung und Quellen: 06-evidenz/berechnungstransparenz.md
      - Quellenregister: 06-evidenz/quellenregister.md
      - KdU-Quellen Berlin 2026: 06-evidenz/kdu-quellen-berlin-2026.md
  - Darstellung der Ergebnisse:
      - Visualisierungen: 07-visualisierung/visualisierungen.md
  - Qualität und Verantwortung:
      - Validierung, Neutralität und Ethik: 09-governance/validierung-governance-ethik.md
